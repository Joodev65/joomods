name: Build APK and Push Result

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false
      backgroundUrl:
        description: 'URL background (wajib PNG)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Process DPI Icons
        if: ${{ inputs.iconUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp curl

          mkdir -p /tmp/icon
          ICON_URL="${{ inputs.iconUrl }}"
          EXT="${ICON_URL##*.}"
          ICON_TMP="/tmp/icon/icon.$EXT"
          curl -L "$ICON_URL" -o "$ICON_TMP"

          declare -A sizes=( 
            ["mipmap-mdpi"]=48 
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for dir in "${!sizes[@]}"; do
            SIZE=${sizes[$dir]}
            TARGET_DIR="$ANDROID_DIR/app/src/main/res/$dir"
            mkdir -p "$TARGET_DIR"
            
            convert "$ICON_TMP" -resize "${SIZE}x${SIZE}" "$TARGET_DIR/ic_launcher.webp"

            convert "$ICON_TMP" -resize "${SIZE}x${SIZE}" \
              -alpha set -background none \
              \( -size ${SIZE}x${SIZE} xc:none -fill white -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),$((SIZE-1))" \) \
              -compose DstIn -composite \
              "$TARGET_DIR/ic_launcher_round.webp"
          done

      - name: Replace mipmap default icons (192x192 kotak)
        if: ${{ inputs.iconUrl != '' || inputs.backgroundUrl != '' }}
        run: |
          MIPMAP_DIR="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$MIPMAP_DIR"

          if [ "${{ inputs.iconUrl }}" != "" ]; then
            curl -L "${{ inputs.iconUrl }}" -o /tmp/ic_launcher_foreground.png
            convert /tmp/ic_launcher_foreground.png -resize 192x192\! "$MIPMAP_DIR/ic_launcher_foreground.png"
          fi

          if [ "${{ inputs.backgroundUrl }}" != "" ]; then
            curl -L "${{ inputs.backgroundUrl }}" -o /tmp/ic_launcher_background.png
            convert /tmp/ic_launcher_background.png -resize 192x192\! "$MIPMAP_DIR/ic_launcher_background.png"
          fi

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Zip APK result
        run: |
          mkdir -p /tmp/build_result
          cp "$ANDROID_DIR/app/build/outputs/apk/debug/"*-debug*.apk /tmp/build_result/
          cd /tmp/build_result
          zip -r app_result.zip *

      - name: Push APK zip to repo X folder
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git clone https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git repo_push
          cp /tmp/build_result/app_result.zip repo_push/X/
          cd repo_push
          git add X/app_result.zip
          git commit -m "Add new APK result from workflow"
          git push

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
