name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV
          echo "Android dir: $DIR"

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          if [ -z "$STRINGS" ]; then
            echo "strings.xml not found"
            exit 1
          fi
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          if [ -z "$FILE" ]; then
            echo "MainActivity.kt not found"
            exit 1
          fi
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Replace App Icon
        if: inputs.iconUrl != ''
        run: |
          mkdir -p /tmp/icon
          curl -L "${{ inputs.iconUrl }}" -o /tmp/icon/icon.png

          sudo apt-get update
          sudo apt-get install -y imagemagick
 
          declare -A icons=(
            ["mipmap-mdpi"]="ic_launcher.png"
            ["mipmap-hdpi"]="ic_launcher.png"
            ["mipmap-xhdpi"]="ic_launcher.png"
            ["mipmap-xxhdpi"]="ic_launcher.png"
            ["mipmap-xxxhdpi"]="ic_launcher.png"
            ["mipmap-anydpi-v26"]="ic_launcher.xml"
            ["mipmap-mdpi-v26"]="ic_launcher_round.png"
            ["mipmap-hdpi-v26"]="ic_launcher_round.png"
            ["mipmap-xhdpi-v26"]="ic_launcher_round.png"
            ["mipmap-xxhdpi-v26"]="ic_launcher_round.png"
            ["mipmap-xxxhdpi-v26"]="ic_launcher_round.png"
          )

          for dir in "${!icons[@]}"; do
            TARGET="$ANDROID_DIR/app/src/main/res/$dir/${icons[$dir]}"
            if [ -f "$TARGET" ]; then
              convert /tmp/icon/icon.png -resize 192x192 "$TARGET"
            fi
          done

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            "$ANDROID_DIR"/app/build/outputs/apk/debug/*.apk
