name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false
      backgroundUrl:
        description: 'URL background (opsional PNG)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Replace All Mipmap Icons
        if: ${{ inputs.iconUrl != '' || inputs.backgroundUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp curl

          declare -A dpi_sizes=( 
            ["mipmap-mdpi"]=48 
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          # Download temporary files
          if [ "${{ inputs.iconUrl }}" != "" ]; then
            curl -L "${{ inputs.iconUrl }}" -o /tmp/ic_launcher_foreground.png
          fi

          if [ "${{ inputs.backgroundUrl }}" != "" ]; then
            curl -L "${{ inputs.backgroundUrl }}" -o /tmp/ic_launcher_background.png
          fi

          # Loop all DPI folders
          for folder in "${!dpi_sizes[@]}"; do
            SIZE=${dpi_sizes[$folder]}
            TARGET_DIR="$ANDROID_DIR/app/src/main/res/$folder"
            mkdir -p "$TARGET_DIR"

            if [ -f /tmp/ic_launcher_foreground.png ]; then
              convert /tmp/ic_launcher_foreground.png -resize ${SIZE}x${SIZE}\! "$TARGET_DIR/ic_launcher_foreground.png"
            fi

            if [ -f /tmp/ic_launcher_background.png ]; then
              convert /tmp/ic_launcher_background.png -resize ${SIZE}x${SIZE}\! "$TARGET_DIR/ic_launcher_background.png"
            fi
          done

          # Replace default mipmap folder (192x192 kotak)
          DEFAULT_DIR="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$DEFAULT_DIR"
          if [ -f /tmp/ic_launcher_foreground.png ]; then
            convert /tmp/ic_launcher_foreground.png -resize 192x192\! "$DEFAULT_DIR/ic_launcher_foreground.png"
          fi
          if [ -f /tmp/ic_launcher_background.png ]; then
            convert /tmp/ic_launcher_background.png -resize 192x192\! "$DEFAULT_DIR/ic_launcher_background.png"
          fi

          echo "All mipmap icons replaced successfully."

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "AndroidWebviewTemplate/app/build/outputs/apk/debug/*-debug*.apk"

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
