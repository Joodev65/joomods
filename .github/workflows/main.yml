name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Replace mipmap default icons (192x192 kotak)
        if: ${{ inputs.iconUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick curl

          MIPMAP_DIR="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$MIPMAP_DIR"

          # Foreground icon
          curl -L "${{ inputs.iconUrl }}" -o /tmp/ic_launcher_foreground.png
          convert /tmp/ic_launcher_foreground.png -resize 192x192\! "$MIPMAP_DIR/ic_launcher_foreground.png"

          # Transparent background 192x192
          convert -size 192x192 xc:none "$MIPMAP_DIR/ic_launcher_background.png"

          echo "Replaced mipmap default icons: foreground from URL, background transparan"

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "AndroidWebviewTemplate/app/build/outputs/apk/debug/*-debug*.apk"

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
