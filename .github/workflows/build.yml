name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            curl \
            git \
            openjdk-17-jdk \
            libarchive-tools \
            imagemagick \
            wget \
            zip \
            file

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Normalize URL
        run: |
          URL="${{ inputs.zipUrl }}"

          echo "Original URL: $URL"

          # remove quotes
          URL=$(echo "$URL" | tr -d '"')

          # fix github blob
          URL=$(echo "$URL" | sed 's/github.com/raw.githubusercontent.com/' | sed 's/\/blob\//\//')

          echo "Normalized URL: $URL"

          echo "ZIP_URL=$URL" >> $GITHUB_ENV

      - name: Download project ZIP (robust)
        run: |
          mkdir -p build

          echo "Downloading project..."

          success=0

          for i in 1 2 3 4 5; do

            echo "Attempt $i"

            curl -L --fail --retry 3 --connect-timeout 20 "$ZIP_URL" -o build/project.zip && success=1 && break

            wget -O build/project.zip "$ZIP_URL" && success=1 && break

            sleep 3

          done

          if [ $success -ne 1 ]; then
            echo "Download failed"
            exit 1
          fi

          echo "Download complete"

          ls -lh build

      - name: Validate ZIP
        run: |
          FILETYPE=$(file build/project.zip)

          echo "$FILETYPE"

          if [[ "$FILETYPE" != *"Zip archive"* ]]; then
            echo "Downloaded file is not ZIP"
            exit 1
          fi

      - name: Extract project
        run: |
          mkdir -p build/project

          echo "Extracting ZIP..."

          bsdtar -xf build/project.zip -C build/project \
          || unzip -o build/project.zip -d build/project

      - name: Normalize project structure
        run: |
          echo "Normalizing project structure..."

          COUNT=$(find build/project -mindepth 1 -maxdepth 1 | wc -l)

          if [ "$COUNT" = "1" ]; then

            FIRST=$(find build/project -mindepth 1 -maxdepth 1 | head -n1)

            if [ -d "$FIRST" ]; then
              mv "$FIRST"/* build/project/ 2>/dev/null || true
              mv "$FIRST"/.[!.]* build/project/ 2>/dev/null || true
              mv "$FIRST"/..?* build/project/ 2>/dev/null || true
            fi

          fi

      - name: Debug project files
        run: |
          echo "Project structure:"
          find build/project -maxdepth 4

      - name: Generate launcher icons
        run: |
          BASE="build/project/android/app/src/main/res"

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do

            case $d in
              mdpi) SIZE=48 ;;
              hdpi) SIZE=72 ;;
              xhdpi) SIZE=96 ;;
              xxhdpi) SIZE=144 ;;
              xxxhdpi) SIZE=192 ;;
            esac

            DIR="$BASE/mipmap-$d"
            ICON="$DIR/ic_launcher.png"

            mkdir -p "$DIR"

            if [ -f "$ICON" ]; then
              convert "$ICON" -resize ${SIZE}x${SIZE} "$ICON" || true
            else
              convert -size ${SIZE}x${SIZE} xc:"#3DDC84" \
                -gravity center \
                -pointsize 24 \
                -fill white \
                -annotate 0 "A" \
                "$ICON"
            fi

          done

      - name: Detect project type
        run: |

          PUBSPEC=$(find build/project -name pubspec.yaml | head -n1)

          if [ ! -z "$PUBSPEC" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$PUBSPEC")" >> $GITHUB_ENV
            exit 0
          fi

          GRADLE=$(find build/project -name gradlew | head -n1)

          if [ ! -z "$GRADLE" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLE")" >> $GITHUB_ENV
            exit 0
          fi

          echo "Unsupported project"
          exit 1

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.3"
          cache: true

      - name: Flutter doctor
        if: env.TYPE == 'flutter'
        run: flutter doctor -v

      - name: Install Flutter dependencies
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"

          for i in 1 2 3; do
            flutter pub get && break
            sleep 3
          done

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"

          flutter build apk --release \
          || flutter build apk --release --no-tree-shake-icons \
          || flutter build apk --debug

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"

          chmod +x gradlew

          ./gradlew assembleRelease \
          || ./gradlew build \
          || ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p result

          APK=$(find build -type f -name "*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "APK found: $APK"

          cp "$APK" result/app_${{ inputs.jobId }}.apk

          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip
