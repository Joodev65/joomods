name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Prevent hanging builds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl git openjdk-17-jdk libarchive-tools imagemagick tree

      - name: Download ZIP
        run: |
          mkdir -p build/project
          curl -L --max-time 120 --retry 3 "${{ inputs.zipUrl }}" -o build/project.zip
          
          echo "Extracting ZIP..."
          bsdtar -xf build/project.zip -C build/project || unzip -q build/project.zip -d build/project

      - name: Normalize project structure
        run: |
          echo "Normalizing structure..."
          
          # Handle nested single-folder extraction
          COUNT=$(find build/project -mindepth 1 -maxdepth 1 -type d | wc -l)
          FILES=$(find build/project -mindepth 1 -maxdepth 1 -type f | wc -l)
          
          if [ "$COUNT" -eq 1 ] && [ "$FILES" -eq 0 ]; then
            FIRST=$(find build/project -mindepth 1 -maxdepth 1 -type d | head -n1)
            echo "Found nested folder: $FIRST"
            mv "$FIRST"/* build/project/ 2>/dev/null || true
            mv "$FIRST"/.[!.]* build/project/ 2>/dev/null || true
            mv "$FIRST"/..?* build/project/ 2>/dev/null || true
            rmdir "$FIRST" 2>/dev/null || true
          fi

      - name: Debug project structure
        run: |
          echo "=== Project Structure ==="
          tree -L 3 build/project || find build/project -maxdepth 3 -type f | head -30
          
          echo "=== Looking for key files ==="
          find build/project -name "pubspec.yaml" -o -name "gradlew" -o -name "build.gradle*" | head -10

      - name: Detect project type and Flutter version
        id: detect
        run: |
          PUBSPEC=$(find build/project -name pubspec.yaml -not -path "*/.*" | head -n1)
          
          if [ ! -z "$PUBSPEC" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$PUBSPEC")" >> $GITHUB_ENV
            echo "Detected Flutter project at $(dirname "$PUBSPEC")"
            
            # Extract Flutter version from pubspec.yaml if specified
            FLUTTER_VERSION=$(grep -E '^\s*flutter:' -A 5 "$PUBSPEC" | grep 'sdk:' | head -n1 || echo "")
            
            # Check for fvm or version constraints
            if [ -f "$(dirname "$PUBSPEC")/.fvm/fvm_config.json" ]; then
              FVM_VERSION=$(cat "$(dirname "$PUBSPEC")/.fvm/fvm_config.json" | grep -o '"flutterSdkVersion": "[^"]*"' | cut -d'"' -f4)
              if [ ! -z "$FVM_VERSION" ]; then
                echo "FVM_VERSION=$FVM_VERSION" >> $GITHUB_ENV
                echo "FVM version detected: $FVM_VERSION"
              fi
            fi
            
            exit 0
          fi

          GRADLE=$(find build/project -name gradlew -not -path "*/.*" | head -n1)
          
          if [ ! -z "$GRADLE" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLE")" >> $GITHUB_ENV
            echo "Detected Gradle project at $(dirname "$GRADLE")"
            exit 0
          fi

          echo "::error::No Flutter or Gradle project detected"
          exit 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # Use FVM version if available, otherwise let it use latest stable
          flutter-version: ${{ env.FVM_VERSION || '' }}

      - name: Verify environment
        if: env.TYPE == 'flutter'
        run: |
          flutter --version
          java -version

      - name: Fix common Flutter issues
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          
          # Ensure android directory exists
          if [ ! -d "android" ]; then
            echo "::error::Android directory not found"
            exit 1
          fi
          
          # Fix gradle wrapper permissions
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi
          
          # Create local.properties if missing (Flutter will handle SDK path)
          if [ ! -f "android/local.properties" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties 2>/dev/null || true
          fi

      - name: Flutter pub get
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter pub get || (flutter clean && flutter pub get)

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          
          # Build with error handling and shrinker disabled if needed
          flutter build apk --release --no-shrink || \
          flutter build apk --release --no-shrink --split-debug-info=build/symbols || \
          (echo "::warning::Standard build failed, trying with verbose output" && \
           flutter build apk --release --verbose 2>&1 | tail -100 && exit 1)

      - name: Setup Android SDK for Gradle
        if: env.TYPE == 'gradle'
        uses: android-actions/setup-android@v3

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"
          chmod +x gradlew
          
          # Try multiple build strategies
          ./gradlew assembleRelease --no-daemon --stacktrace || \
          ./gradlew assembleRelease --no-daemon --offline || \
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p result
          
          # Search multiple possible output locations
          APK=$(find build -name "*.apk" -path "*release*" | grep -v "intermediates" | head -n1)
          
          if [ -z "$APK" ]; then
            APK=$(find "$DIR" -name "*.apk" -path "*release*" | grep -v "intermediates" | head -n1)
          fi
          
          if [ -z "$APK" ]; then
            echo "::error::APK not found. Build outputs:"
            find build -name "*.apk" 2>/dev/null || find "$DIR" -name "*.apk" 2>/dev/null || echo "No APKs found"
            exit 1
          fi
          
          echo "APK found: $APK"
          ls -lh "$APK"
          
          # Copy with job ID
          cp "$APK" "result/app_${{ inputs.jobId }}.apk"
          
          # Create zip
          cd result
          zip -j "app_${{ inputs.jobId }}.zip" "app_${{ inputs.jobId }}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip
          retention-days: 7

      - name: Push to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Configure git
          git config --global user.name "Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Clone with token
          git clone --depth 1 "https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git" repo 2>/dev/null || \
          (echo "::error::Failed to clone repo - check GH_PAT secret" && exit 1)
          
          mkdir -p repo/X
          cp "result/app_${{ inputs.jobId }}.zip" repo/X/
          
          cd repo
          
          # Check if there are changes
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add X/
          git commit -m "Add APK ${{ inputs.jobId }} - $(date +%Y%m%d_%H%M%S)" || true
          git push origin HEAD || (echo "::warning::Push failed" && exit 0)
