name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            curl \
            git \
            openjdk-17-jdk \
            libarchive-tools \
            imagemagick \
            wget \
            zip \
            file

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Normalize URL
        run: |
          URL="${{ inputs.zipUrl }}"

          echo "Original URL: $URL"

          URL=$(echo "$URL" | tr -d '"')
          URL=$(echo "$URL" | sed 's/github.com/raw.githubusercontent.com/' | sed 's/\/blob\//\//')

          echo "Normalized URL: $URL"

          echo "ZIP_URL=$URL" >> $GITHUB_ENV

      - name: Download project ZIP
        run: |
          mkdir -p build

          success=0
          for i in 1 2 3 4 5; do
            curl -L --fail --retry 3 --connect-timeout 20 "$ZIP_URL" -o build/project.zip && success=1 && break
            wget -O build/project.zip "$ZIP_URL" && success=1 && break
            sleep 3
          done

          if [ $success -ne 1 ]; then
            echo "Download failed"
            exit 1
          fi

      - name: Validate ZIP
        run: |
          FILETYPE=$(file build/project.zip)
          echo "$FILETYPE"

          if [[ "$FILETYPE" != *"Zip archive"* ]]; then
            echo "Downloaded file is not ZIP"
            exit 1
          fi

      - name: Extract project
        run: |
          mkdir -p build/project
          bsdtar -xf build/project.zip -C build/project \
          || unzip -o build/project.zip -d build/project

      - name: Normalize project structure
        run: |
          COUNT=$(find build/project -mindepth 1 -maxdepth 1 | wc -l)

          if [ "$COUNT" = "1" ]; then
            FIRST=$(find build/project -mindepth 1 -maxdepth 1 | head -n1)

            if [ -d "$FIRST" ]; then
              mv "$FIRST"/* build/project/ 2>/dev/null || true
              mv "$FIRST"/.[!.]* build/project/ 2>/dev/null || true
              mv "$FIRST"/..?* build/project/ 2>/dev/null || true
            fi
          fi

      - name: Detect project type
        run: |
          PUBSPEC=$(find build/project -type f -name pubspec.yaml | head -n1)

          if [ -n "$PUBSPEC" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$PUBSPEC")" >> $GITHUB_ENV
            exit 0
          fi

          GRADLEW=$(find build/project -type f -name gradlew | head -n1)

          if [ -n "$GRADLEW" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLEW")" >> $GITHUB_ENV
            exit 0
          fi

          echo "Unsupported project"
          exit 1

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          cache: true

      - name: Flutter doctor
        if: env.TYPE == 'flutter'
        run: flutter doctor -v

      - name: Install Flutter dependencies
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter pub get || flutter pub get || true

      - name: Patch Android Gradle
        if: env.TYPE == 'flutter'
        run: |
          echo "Patching Gradle..."
          ANDROID="$DIR/android"

          if [ -d "$ANDROID" ]; then

            find "$ANDROID" -name "build.gradle" -type f -exec sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' {} \; || true

            if [ -f "$ANDROID/gradle/wrapper/gradle-wrapper.properties" ]; then
              sed -i 's/gradle-[0-9.]*-bin/gradle-8.10-bin/g' "$ANDROID/gradle/wrapper/gradle-wrapper.properties"
            fi

          fi

      - name: Patch missing Flutter files
        if: env.TYPE == 'flutter'
        run: |
          LIB="$DIR/lib"

          if [ ! -f "$LIB/admin_page.dart" ]; then
            echo "Generating missing admin_page.dart"
            cat <<EOF > "$LIB/admin_page.dart"
import 'package:flutter/material.dart';

class AdminPage extends StatelessWidget {
  final String? sessionKey;

  const AdminPage({super.key, this.sessionKey});

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      body: Center(child: Text("Admin Placeholder")),
    );
  }
}
EOF
          fi

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"

          flutter build apk --release \
          || flutter build apk --release --no-tree-shake-icons \
          || flutter build apk --debug \
          || flutter build apk --profile

      - name: Last resort Gradle build
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR/android"
          chmod +x gradlew || true
          ./gradlew assembleDebug || true

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease \
          || ./gradlew build \
          || ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p result

          APK=$(find build -type f -name "*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          cp "$APK" result/app_${{ inputs.jobId }}.apk

          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip
