name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl git openjdk-17-jdk

      - name: Download ZIP
        run: |
          mkdir -p build
          curl -L "${{ inputs.zipUrl }}" -o build/project.zip
          unzip -qq -o build/project.zip -d build/project

      - name: Debug project structure
        run: |
          echo "=== PROJECT STRUCTURE ==="
          find build/project -maxdepth 4

      - name: Detect project type
        run: |
          PUBSPEC=$(find build/project -type f -name pubspec.yaml | head -n1)

          if [ -n "$PUBSPEC" ]; then
            ROOT=$(dirname "$PUBSPEC")
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "PROJECT_DIR=$ROOT" >> $GITHUB_ENV
            echo "Detected Flutter project: $ROOT"
            exit 0
          fi

          GRADLE=$(find build/project -type f -name gradlew | head -n1)

          if [ -n "$GRADLE" ]; then
            ROOT=$(dirname "$GRADLE")
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "PROJECT_DIR=$ROOT" >> $GITHUB_ENV
            echo "Detected Gradle project: $ROOT"
            exit 0
          fi

          echo "Unsupported project"
          exit 1

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          cache: true

      - name: Flutter pub get
        if: env.TYPE == 'flutter'
        run: |
          cd "$PROJECT_DIR"
          flutter pub get

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$PROJECT_DIR"
          flutter build apk --release

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Locate APK
        run: |
          echo "Searching APK..."
          APK=$(find build -type f -name "*release*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK found: $APK"

      - name: Pack APK
        run: |
          mkdir -p result
          cp "$APK_PATH" result/app_${{ inputs.jobId }}.apk
          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip

      - name: Push to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Joodev65/Joomodss.id.git repo

          mkdir -p repo/X
          cp result/app_${{ inputs.jobId }}.zip repo/X/

          cd repo
          git config user.name "Actions Bot"
          git config user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git

          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push
