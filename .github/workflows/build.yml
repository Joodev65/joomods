name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl git openjdk-17-jdk

      - name: Download ZIP
        run: |
          mkdir -p build
          curl -L "${{ inputs.zipUrl }}" -o build/project.zip
          unzip -qq -o build/project.zip -d build/project

      - name: Detect project type
        run: |
          FLUTTER=$(find build/project -name pubspec.yaml | head -n1)
          GRADLE=$(find build/project -name gradlew | head -n1)

          if [ ! -z "$FLUTTER" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$FLUTTER")" >> $GITHUB_ENV
            echo "Detected Flutter project"
          elif [ ! -z "$GRADLE" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLE")" >> $GITHUB_ENV
            echo "Detected Gradle project"
          else
            echo "Project type unsupported"
            exit 1
          fi

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          cache: true

      - name: Flutter pub get
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter pub get

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter build apk --release

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p result
          APK=$(find build -name "*release*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          cp "$APK" result/app_${{ inputs.jobId }}.apk
          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip

      - name: Push to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Joodev65/Joomodss.id.git repo
          mkdir -p repo/X
          cp result/app_${{ inputs.jobId }}.zip repo/X/

          cd repo
          git config user.name "Actions Bot"
          git config user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git
          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push
